name: 🚀 TaskFlow DevOps Demo

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger for demo purposes

jobs:
  # JOB 1: Quality Checks
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 📝 Check HTML files
        run: |
          echo "✅ HTML files validated"
          echo "📄 Found: $(find . -name '*.html' | wc -l) HTML files"
      
      - name: 🎨 Check CSS files  
        run: |
          echo "✅ CSS files validated" 
          echo "🎨 Found: $(find . -name '*.css' | wc -l) CSS files"
      
      - name: 📜 Check JavaScript files
        run: |
          echo "✅ JavaScript files validated"
          echo "📜 Found: $(find . -name '*.js' | wc -l) JS files"

  # JOB 2: Build & Package
  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 📦 Create deployment package
        run: |
          mkdir deploy
          cp -r index.html css js deploy/
          tar -czf taskflow-release.tar.gz deploy/
          echo "✅ Build complete - Package size: $(du -h taskflow-release.tar.gz | cut -f1)"
      
      - name: 💾 Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: taskflow-build
          path: taskflow-release.tar.gz

  # JOB 3: Deploy (Demo)
  deploy-demo:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      
      - name: 🚀 Simulate deployment
        run: |
          echo "═══════════════════════════════════════"
          echo "🎉 DEPLOYMENT SUCCESSFUL 🎉"
          echo "═══════════════════════════════════════"
          echo "📱 App: TaskFlow Task Manager"
          echo "🔢 Version: 2.0.0"
          echo "🌐 Environment: Production"
          echo "📅 Deployed: $(date)"
          echo "🔗 URL: https://your-app.github.io/taskflow"
          echo "═══════════════════════════════════════"
      
      - name: 📧 Send notification (Demo)
        run: |
          echo "📧 Email notification sent to: team@example.com"
          echo "💬 Slack notification sent to: #deployments"

  # JOB 4: Health Check
  health:
    needs: deploy-demo
    runs-on: ubuntu-latest
    steps:
      - name: 🏥 Run health checks
        run: |
          echo "═══════════════════════════════════════"
          echo "🏥 HEALTH CHECK RESULTS"
          echo "═══════════════════════════════════════"
          echo "✅ Application: Healthy"
          echo "✅ Database: Connected (localStorage)"
          echo "✅ API: Responding (200 OK)"
          echo "✅ Response Time: <100ms"
          echo "═══════════════════════════════════════"