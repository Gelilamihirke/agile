<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TaskFlow | Offline Task Manager Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-tasks"></i> TaskFlow</h2>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-btn active" data-view="dashboard"><i class="fas fa-chart-line"></i><span> Dashboard</span></button>
            <button class="nav-btn" data-view="tasks"><i class="fas fa-list-check"></i><span> All Tasks</span></button>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 id="page-title">Dashboard</h1>
            <button class="btn-primary" id="createTaskBtn"><i class="fas fa-plus"></i> New Task</button>
        </header>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view active">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-icon total"><i class="fas fa-tasks"></i></div><div class="stat-info"><h3>Total Tasks</h3><p class="stat-number" id="totalTasks">0</p></div></div>
                <div class="stat-card"><div class="stat-icon pending"><i class="fas fa-clock"></i></div><div class="stat-info"><h3>Pending</h3><p class="stat-number" id="pendingTasks">0</p></div></div>
                <div class="stat-card"><div class="stat-icon progress"><i class="fas fa-spinner"></i></div><div class="stat-info"><h3>In Progress</h3><p class="stat-number" id="inProgressTasks">0</p></div></div>
                <div class="stat-card"><div class="stat-icon completed"><i class="fas fa-check-circle"></i></div><div class="stat-info"><h3>Completed</h3><p class="stat-number" id="completedTasks">0</p></div></div>
            </div>
            <div class="recent-tasks"><h2>📌 Recent Tasks</h2><div class="tasks-list" id="recentTasksList"></div></div>
        </div>

        <!-- Tasks View -->
        <div id="tasks-view" class="view">
            <div class="filters-bar">
                <input type="text" id="searchInput" placeholder="Search tasks..." class="search-input">
                <select id="statusFilter" class="filter-select"><option value="">All Status</option><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select>
                <select id="priorityFilter" class="filter-select"><option value="">All Priority</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select>
            </div>
            <div class="tasks-list" id="allTasksList"></div>
        </div>
    </main>
</div>

<!-- Task Modal -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2 id="modalTitle">Create New Task</h2><span class="close">&times;</span></div>
        <form id="taskForm">
            <input type="hidden" id="taskId">
            <div class="form-group"><label>Title *</label><input type="text" id="taskTitle" required placeholder="Design review, report..."></div>
            <div class="form-group"><label>Description</label><textarea id="taskDescription" rows="2" placeholder="Additional details..."></textarea></div>
            <div class="form-row">
                <div class="form-group"><label>Priority</label><select id="taskPriority"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>
                <div class="form-group"><label>Status</label><select id="taskStatus"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="completed">Completed</option></select></div>
            </div>
            <div class="form-group"><label>Due Date</label><input type="datetime-local" id="taskDueDate"></div>
            <div class="modal-footer"><button type="button" class="btn-secondary" id="cancelBtn">Cancel</button><button type="submit" class="btn-primary">Save Task</button></div>
        </form>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
